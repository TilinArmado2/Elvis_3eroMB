<!DOCTYPE html>
<html>
    <form>
        <div>
            <label>Cédula:</label><br>
            <input
            type="text"
            placeholder="Ej:1234678"
            inputmode="numeric"
            pattern="[0-9]{8}"
            maxlength="8"
            >
        </div>
        <br>
        <div>
            <label>Contraseña</label><br>
            <input type="password" 
            placeholder="contraseña"
            maxlength="26">
        </div>
        <br>
        <button type="button">INGRESAR</button>
    </form>
</html>
