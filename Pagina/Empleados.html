<html>
    <form>
        <div>
            <label>Cédula:</label><br>
            <input
                type="text"
                placeholder="Ej:1234678"
                inputmode="numeric"
                pattern="^[1-9][0-9]{6,7}$"
                maxlength="8"
                title="Debe ser mayor a 1.000.000 y no puede comenzar con 0"
                required
            >
        </div>

        <br>

        <div>
            <label for="contraseñas">Contraseña</label><br>
            <input 
                type="password" 
                placeholder="contraseña"
                maxlength="26"
                id="clave"
                required
            >
        </div>
        <div>
        <input type="checkbox" onclick="mostrarContraseña()">
        <span>Mostrar Contraseña</span>
        </div>

        <br>

        <button type="submit">INGRESAR</button>

        <br><br>
        
    </form>
    <script>
        function mostrarContraseña() {
            var campo =document.getElementById("clave");
            if (campo.type === "password") {
                campo.type = "text";
            }else{
                campo.type = "password";
            }
        }
    </script>

</html>
