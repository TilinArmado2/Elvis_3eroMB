<html>
    <form>
            <label>Cédula:</label><br>
            <input
                type="text"
                placeholder="Ej:1234678"
                inputmode="numeric"
                pattern="^[1-9][0-9]{6,7}$"
                maxlength="8"
                title="Debe ser mayor a 1.000.000 y no puede comenzar con 0"
                required
                id="CI"
            >

        <br>

    
            <label for="contraseñas">Contraseña</label><br>
            <input 
                type="password" 
                placeholder="contraseña"
                maxlength="26"
                id="clave"
                required
            >
        

        <input type="checkbox" onclick="mostrarContraseña()">
        <span>Mostrar Contraseña</span>


        <br>

        <button type="button" onclick="validarLogin(event)">Ingresar</button>

        <br><br>
        
    </form>
  

</html>
