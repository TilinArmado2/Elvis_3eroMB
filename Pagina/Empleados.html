<!DOCTYPE html>

<title>Todo en Blanco - Login de Empleados</title>
<link rel="stylesheet" href="../assets/css/style.css">
<nav>
            <a href="index.html">Inicio</a>
            <a href="Sobre Nosotros.html">Sobre Nosotros</a>
            <a href="cobertura.html">Ver Zonas de Envío</a>
            <a href="Empleados.html">Para Empleados</a>
            <a href="SeparacionContacto.html">Contactanos!</a>
        </nav>



<html>
    <form>
        <div>
            <label>Cédula:</label><br>
            <input
                type="text"
                placeholder="Ej:1234678"
                inputmode="numeric"
                pattern="^[1-9][0-9]{6,7}$"
                maxlength="8"
                title="Debe ser mayor a 1.000.000 y no puede comenzar con 0"
                required
                id="CI"
            >
        </div>

        <br>

        <div>
            <label for="contraseñas">Contraseña</label><br>
            <input 
                type="password" 
                placeholder="contraseña"
                maxlength="26"
                id="clave"
                required
            >
        </div>
        <div>
        <input type="checkbox" onclick="mostrarContraseña()">
        <span>Mostrar Contraseña</span>
        </div>

        <br>

        <button type="button" onclick="validarLogin(event)">Ingresar</button>

        <br><br>
        
    </form>
    <script>
        function mostrarContraseña() {
            var campo =document.getElementById("clave");
            if (campo.type === "password") {
                campo.type = "text";
            }else{
                campo.type = "password";
            }
        }
    </script>
    <script>
        function validarLogin(event) {
        event.preventDefault();
        var user = document.getElementById("CI").value;
        var pass = document.getElementById("clave").value;
        var usuarioCorrecto = "11111111";
        var contraseñaCorrecta ="1234";
        if (user === usuarioCorrecto && pass === contraseñaCorrecta) {
            alert("Bienvenido, administrador.");
            window.location.href = "Empleados_administracion.html";
        }else{
            alert("Usuario o contraseña incorrectos. Intenta de nuevo.");
        }
    }
    </script>

</html>
