<head>
    <h1>Formulario de Contacto</h1>
</head>

<form>
<label for="telefono">Telefono de contacto</label>

<input
  type="tel"
  id="telefono"
  name="telefono"
  required
  inputmode="numeric"
  autocomplete="tel"
  maxlength="9"
  pattern="^0[0-9]{8}$"
  placeholder="Ingrese su numero de telefono"
  title="Debe comenzar con 0 y tener 9 digitos"
>
<button type="submit">Enviar</button>
</form>
