<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Contacto</title>
</head>

<body>

    <h1>Formulario de Contacto</h1>

    <form>
        <label for="telefono">Teléfono de contacto</label><br>

        <input
          type="tel"
          id="telefono"
          name="telefono"
          required
          inputmode="numeric"
          autocomplete="tel"
          maxlength="9"
          pattern="^0[0-9]{8}$"
          placeholder="Ingrese su numero de telefono"
          title="Debe comenzar con 0 y tener 9 digitos"
        >

        <br><br>

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
