<!DOCTYPE html>

<form>
    <div>
        <label>Nombre:</label><br>
        <input type="text" name="nombre" placeholder="Juan" autocomplete="given-name" required>
    </div>

    <br>

    <div>
        <label>Apellido:</label><br>
        <input type="text" name="apellido" placeholder="Pérez" autocomplete="family-name" required>
    </div>
    
    <br>

    <div>
        <label>Telefono:</label><br>
        <input type="tel" name="telefono" placeholder="099123456">
    </div>

    <br>

    <div>
        <label>Correo Electronico:</label><br>
        <input type="email" name="correo" placeholder="example@gmail.com" autocomplete="email" required>
    </div>

    <br>

    <div>
        <label>Sector de Interes:</label><br>
        <select name="sector" required>
            <option value="">-- Seleccione una opcion --</option>
            <option value="Catalogo">Catalogo</option>
            <option value="Repuestos">Repuestos</option>
            <option value="Desperfectos">Desperfectos</option>
        </select>
    </div>

    <br>

    <div>
        <label>Descripción</label><br>
        <textarea name="mensaje" placeholder="Escribe una breve presentación..." rows="5" cols="30" required></textarea>
    </div>

    <br>

    <div>
        <label>Adjuntar archivo:</label><br>
        <input type="file" name="cv" accept=".pdf" required>
    </div>

    <button type="submit">Enviar Solicitud</button>

    <br>

    <a href="index.html">Regresar</a>
</form>
