<!DOCTYPE html>
<form>
    <div>
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required>
    </div>

    <br>

    <div>
        <label>Apellido:</label><br>
        <input type="text" name="apellido" required>
    </div>
    
    <br>

    <div>
        <label>Telefono:</label><br>
        <input type="tel" name="telefono" required>
    </div>

    <br>

    <div>
        <label>Correo Electronico:</label><br>
        <input type="email" name="Correo" placeholder="nombre@ejemplo.com" required>
    </div>

    <br>

    <div>
        <label>Sector de Interes:</label><br>
        <select name="sector" required>
            <option value="">-- Seleccione una opcion --</option>
            <option value="Catalogo">Catalogo</option>
            <option value="Repuestos">Repuestos</option>
            <option value="Desperfectos">Desperfectos</option>
        </select>
    </div>

    <br>

    <div>
        <label>Descripción</label><br>
        <textarea name="descripcion" rows="5" cols="30" placeholder="Añade una descripcion..." required></textarea>
    </div>
    <button type="btn">Enviar Solicitud</button>

    <br>

    <a href="index.html">regresar</a>
</form>
