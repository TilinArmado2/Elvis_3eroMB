<!DOCTYPE html>
<html>

<head>
    <title>Todo en Blanco - Formulario de Soporte</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/formularios.css">
    <link rel="stylesheet" href="../assets/css/Basicos.css">
</head>

<body>

    <header class="panelSuperior">

        <input type="checkbox" id="menuToggle">

        <label for="menuToggle" class="btnMenu">☰</label>

        <nav class="menuNavegacion">
            <a href="index.html">Inicio</a>
            <a href="Sobre Nosotros.html">Sobre Nosotros</a>
            <a href="cobertura.html">Ver Zonas de Envío</a>
            <a href="Empleados.html">Para Empleados</a>
            <a href="SeparacionContacto.html">Contactanos!</a>
        </nav>

    </header>

    <form>

        <h1>Contactos a soporte</h1>

        <label>Nombre:</label><br>
        <input type="text" name="nombre" placeholder="Juan" autocomplete="given-name" required>

        <br>

        <label>Apellido:</label><br>
        <input type="text" name="apellido" placeholder="Pérez" autocomplete="family-name" required>

        <br>

        <label>Telefono:</label><br>
        <input type="tel"
            name="telefono"
            placeholder="099123456"
            id="telefono"
            required
            inputmode="numeric"
            autocomplete="tel"
            maxlength="9"
            pattern="^0[0-9]{8}$"
            title="Debe comenzar con 0 y tener 9 digitos">

        <br>

        <label>Correo Electronico:</label><br>
        <input type="email" name="correo" placeholder="example@gmail.com" autocomplete="email" required>

        <br>

        <label>Sector de Interes:</label><br>
        <select name="sector" required>
            <option value="">-- Seleccione una opcion --</option>
            <option value="Catalogo">Catalogo</option>
            <option value="Repuestos">Repuestos</option>
            <option value="Desperfectos">Desperfectos</option>
        </select>

        <br><br>

        <button type="submit">Enviar Solicitud</button>

    </form>

</body>

</html>
