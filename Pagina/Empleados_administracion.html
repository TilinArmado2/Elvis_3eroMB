    <header>

    <main>
        <h2>Gestion de Empleados</h2>
        <p>Desde aqui puedes administrar el personal del sistema.</p>
        <section>
            <h3>Agregar nuevo Empleado</h3>
            <form id="formEmpleado">
                <input type="number" id="ciEmpleado" placeholder="Cedula (Ej: 12345678)" min="1000000" required>
                <input type="text" id="nombreEmpleado" placeholder="Nombre" required>
                <input type="text" id="apellidoEmpleado" placeholder="Apellido" required>
                <input type="text" id="cargoEmpleado" placeholder="Cargo" required>
                <button type="button" onclick="agregarEmpleado()">Agregar</button>
            </form>
        </section>
        <section>
            <table id="tablaEmpleados">
                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Cargo</th>
                        <th>acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2789342</td>
                        <td>Augusto</td>
                        <td>Cuello</td>
                        <td>Logística</td>
                        <td>
                            <button class="button" onclick="prepararModificacion(this)">Modificar</button>
                            <button class="button" onclick="eliminarFila(this)">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>4567123</td>
                        <td>Julián</td>
                        <td>González</td>
                        <td>Administracion</td>
                        <td>
                            <button class="button" onclick="prepararModificacion(this)">Modificar</button>
                            <button class="button" onclick="eliminarFila(this)">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>    
</body>
